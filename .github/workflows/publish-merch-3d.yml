name: Publish Merch 3D Package

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@diloytd'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build -w @diloytd/merch-3d

      - name: Publish package
        run: npm publish -w @diloytd/merch-3d --registry=https://npm.pkg.github.com --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
